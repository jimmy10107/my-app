<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>薪資水瓶 Salary Bottle · 敏捷職涯導引系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;600;700;900&family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #FDFBF7;
    --bg-elev: #FFFFFF;
    --bg-sunken: #F5EFE3;
    --ink: #2A2622;
    --ink-muted: #6B635B;
    --ink-soft: #9A9087;
    --line: #E8E0D1;
    --line-soft: #F0E9DC;
    --rule: #D8CEB9;

    --radius-sm: 6px;
    --radius: 10px;
    --radius-lg: 14px;
    --radius-card: 12px;

    --shadow-card: 0 1px 0 rgba(42,38,34,.04), 0 2px 4px rgba(42,38,34,.06), 0 8px 16px rgba(42,38,34,.05);
    --shadow-card-lift: 0 2px 0 rgba(42,38,34,.05), 0 12px 24px rgba(42,38,34,.12), 0 28px 48px rgba(42,38,34,.1);
    --shadow-panel: 0 1px 2px rgba(42,38,34,.04), 0 10px 30px rgba(42,38,34,.08);

    --font-serif: "Noto Serif TC", "Songti TC", "PingFang TC", serif;
    --font-sans: "Noto Sans TC", "PingFang TC", system-ui, sans-serif;
    --font-mono: "JetBrains Mono", ui-monospace, monospace;
  }

  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: var(--font-serif); }
  body { min-height: 100vh; }

  /* Paper texture overlay */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    background-image:
      radial-gradient(rgba(42,38,34,.018) 1px, transparent 1px),
      radial-gradient(rgba(42,38,34,.015) 1px, transparent 1px);
    background-size: 3px 3px, 7px 7px;
    background-position: 0 0, 1px 2px;
    mix-blend-mode: multiply;
    opacity: .8;
  }

  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, textarea, select { font-family: inherit; color: inherit; }

  .mono { font-family: var(--font-mono); letter-spacing: .02em; }
  .sans { font-family: var(--font-sans); }
  .serif { font-family: var(--font-serif); }

  .card {
    position: relative;
    background: var(--bg-elev);
    border-radius: var(--radius-card);
    box-shadow: var(--shadow-card);
    transition: transform .25s cubic-bezier(.2,.8,.2,1), box-shadow .25s ease;
  }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 10px; border: 2px solid var(--bg); }
  ::-webkit-scrollbar-thumb:hover { background: var(--rule); }

  #root { position: relative; z-index: 2; }

  .topnav {
    position: sticky; top: 0; z-index: 40;
    background: color-mix(in srgb, var(--bg) 92%, transparent);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line);
  }

  @media (max-width: 768px) {
    .desktop-only { display: none !important; }
  }
  @media (min-width: 769px) {
    .mobile-only { display: none !important; }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <template id="__bundler_thumbnail" data-bg-color="#FDFBF7">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <rect width="1200" height="800" fill="#FDFBF7"/>
      <path d="M540 220 h120 v50 l36 62 v240 a36 36 0 0 1 -36 36 h-120 a36 36 0 0 1 -36 -36 v-240 l36 -62 z"
        fill="none" stroke="#2A2622" stroke-width="6"/>
      <path d="M520 430 q36 -24 84 0 t84 0 v138 a36 36 0 0 1 -36 36 h-96 a36 36 0 0 1 -36 -36 z"
        fill="#6B8CAE" opacity="0.85"/>
      <circle cx="600" cy="310" r="28" fill="#C99A2E" stroke="#8E6A14" stroke-width="3"/>
      <text x="600" y="325" text-anchor="middle" font-family="serif" font-size="38" font-weight="700" fill="#5E4631">$</text>
      <text x="600" y="700" text-anchor="middle" font-family="serif" font-size="52" fill="#2A2622" font-weight="500">薪資水瓶</text>
      <text x="600" y="740" text-anchor="middle" font-family="monospace" font-size="18" fill="#6B635B" letter-spacing="4">SALARY · BOTTLE</text>
    </svg>
  </template>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="./src/data.jsx"></script>
  <script type="text/babel" src="./src/card.jsx"></script>
  <script type="text/babel" src="./src/dashboard.jsx"></script>
  <script type="text/babel" src="./src/play.jsx"></script>
  <script type="text/babel" src="./src/console.jsx"></script>
  <script type="text/babel" src="./src/App.jsx"></script>
</body>
</html>
